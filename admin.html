<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>어드민 패널 — CloudPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#06060c;--surface:#0d0d18;--surface2:#131320;--surface3:#181828;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);--text:#f0f0f5;--muted:rgba(240,240,245,.45);--accent:#f97316;--accent2:#ec4899;--success:#22c55e;--warning:#eab308;--error:#ef4444;--info:#6366f1;--font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--sw:220px}
    html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);overflow-x:hidden}
    .wrap{display:flex;min-height:100vh}
    /* Sidebar */
    .aside{width:var(--sw);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .2s}
    .aside-logo{padding:20px 18px;display:flex;align-items:center;gap:8px;font-family:var(--font-head);font-size:.95rem;font-weight:700;border-bottom:1px solid var(--border);text-decoration:none;color:var(--text)}
    .aside-logo .badge-admin{font-size:.6rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:2px 7px;border-radius:10px;margin-left:4px;font-weight:700;letter-spacing:.04em}
    .aside-nav{flex:1;padding:12px 10px;overflow-y:auto}
    .nav-section{margin-bottom:20px}
    .nav-label{font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:0 8px;margin-bottom:5px}
    .nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:var(--muted);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;text-decoration:none}
    .nav-item svg{flex-shrink:0;opacity:.7}
    .nav-item:hover,.nav-item.active{background:var(--surface2);color:var(--text)}
    .nav-item.active{background:rgba(249,115,22,.1);color:var(--accent)}
    .nav-item.active svg,.nav-item:hover svg{opacity:1}
    .nav-item.danger:hover{background:rgba(239,68,68,.1);color:var(--error)}
    .aside-user{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:.82rem;font-weight:700;flex-shrink:0}
    /* Main */
    .main{flex:1;margin-left:var(--sw);min-width:0}
    .topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
    .topbar-title{font-family:var(--font-head);font-size:.95rem;font-weight:700}
    .content{padding:24px}
    /* Stats */
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
    .stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
    .stat-val{font-family:var(--font-head);font-size:1.5rem;font-weight:800;margin-bottom:2px}
    .stat-lbl{font-size:.78rem;color:var(--muted)}
    /* Table */
    .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{padding:11px 16px;text-align:left;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
    td{padding:12px 16px;font-size:.85rem;border-bottom:1px solid var(--border)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    /* Search bar */
    .search-bar{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
    .search-input{flex:1;min-width:200px;padding:9px 13px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:.88rem;outline:none}
    .search-input:focus{border-color:var(--accent)}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:var(--font-body);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;border:none;text-decoration:none}
    .btn-primary{background:linear-gradient(135deg,var(--accent),#e86209);color:#fff}
    .btn-ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--text)}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
    .btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--error)}
    .btn-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--success)}
    .btn-sm{padding:5px 11px;font-size:.78rem;border-radius:6px}
    /* Badge */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:600}
    .status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    /* Section header */
    .section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .section-hd h2{font-family:var(--font-head);font-size:1rem;font-weight:700}
    /* Modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-bg.open{opacity:1;pointer-events:all}
    .modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:30px;width:100%;max-width:480px}
    .modal h3{font-family:var(--font-head);font-size:1rem;font-weight:700;margin-bottom:18px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px;font-weight:500}
    .field input,.field select,.field textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:.88rem;outline:none;transition:border-color .2s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
    .field textarea{resize:vertical;min-height:80px}
    /* Chart */
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
    .chart-title{font-family:var(--font-head);font-size:.9rem;font-weight:700;margin-bottom:14px}
    /* Pagination */
    .pager{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:12px}
    .page-btn{padding:5px 11px;border-radius:6px;font-size:.8rem;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--muted);transition:all .15s}
    .page-btn.active,.page-btn:hover{border-color:var(--accent);color:var(--accent)}
    /* Toast */
    .cp-toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:.88rem;font-weight:500;color:#fff;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:9999}
    .cp-toast.show{opacity:1;transform:none}
    .cp-toast.success{background:#22c55e}.cp-toast.error{background:#ef4444}.cp-toast.info{background:#6366f1}.cp-toast.warning{background:#f59e0b}
    /* Mobile */
    @media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}.main{margin-left:0}}
    @media(max-width:600px){.stat-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <!-- ASIDE -->
  <aside class="aside" id="aside">
    <a href="/admin.html" class="aside-logo">
      <svg width="20" height="20" viewBox="0 0 28 28" fill="none"><path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="currentColor" stroke-width="1.5"/><path d="M14 8L20 11V17L14 20L8 17V11L14 8Z" fill="currentColor" opacity=".5"/><circle cx="14" cy="14" r="2.2" fill="currentColor"/></svg>
      CloudPress<span class="badge-admin">ADMIN</span>
    </a>
    <nav class="aside-nav">
      <div class="nav-section">
        <div class="nav-label">대시보드</div>
        <button class="nav-item active" id="nav-overview" onclick="showSection('overview')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
          개요
        </button>
        <button class="nav-item" id="nav-traffic" onclick="showSection('traffic')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          트래픽
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">관리</div>
        <button class="nav-item" id="nav-users" onclick="showSection('users')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M21 21v-2a4 4 0 0 0-3-3.87" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          사용자 관리
        </button>
        <button class="nav-item" id="nav-sites" onclick="showSection('sites')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 21h8M12 17v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          사이트 관리
        </button>
        <button class="nav-item" id="nav-notices" onclick="showSection('notices')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.5"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          공지 관리
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">매출</div>
        <button class="nav-item" id="nav-revenue" onclick="showSection('revenue')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><line x1="12" y1="1" x2="12" y2="23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          매출 관리
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">시스템</div>
        <button class="nav-item" id="nav-settings" onclick="showSection('settings')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.5"/></svg>
          설정
        </button>
        <a href="/dashboard.html" class="nav-item"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="1.5"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="1.5"/></svg>일반 대시보드</a>
        <button class="nav-item danger" onclick="CP.logout()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>로그아웃</button>
      </div>
    </nav>
    <div class="aside-user">
      <div class="av" id="adminAv">A</div>
      <div><div style="font-size:.84rem;font-weight:600" id="adminName">—</div><div style="font-size:.72rem;color:var(--accent)">어드민</div></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <span class="topbar-title" id="pageTitle">개요</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:.8rem;color:var(--muted)" id="lastRefresh"></span>
        <button class="btn btn-ghost btn-sm" onclick="refreshCurrent()">새로고침</button>
      </div>
    </div>
    <div class="content" id="mainContent">
      <div style="color:var(--muted);padding:20px 0">로딩 중...</div>
    </div>
  </div>
</div>

<!-- User edit modal -->
<div class="modal-bg" id="userModal">
  <div class="modal">
    <h3>사용자 수정</h3>
    <input type="hidden" id="editUserId"/>
    <div class="field"><label>이름</label><input type="text" id="editUserName"/></div>
    <div class="field"><label>역할</label>
      <select id="editUserRole"><option value="user">일반</option><option value="manager">매니저</option><option value="admin">어드민</option></select>
    </div>
    <div class="field"><label>플랜</label>
      <select id="editUserPlan"><option value="free">무료</option><option value="starter">스타터</option><option value="pro">프로</option><option value="enterprise">엔터프라이즈</option></select>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('userModal')">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveUser()">저장</button>
    </div>
  </div>
</div>

<!-- Notice edit modal -->
<div class="modal-bg" id="noticeModal">
  <div class="modal">
    <h3 id="noticeMTitle">공지 작성</h3>
    <input type="hidden" id="editNoticeId"/>
    <div class="field"><label>제목</label><input type="text" id="editNoticeTitle" placeholder="공지 제목"/></div>
    <div class="field"><label>내용</label><textarea id="editNoticeContent" placeholder="공지 내용"></textarea></div>
    <div class="field"><label>유형</label>
      <select id="editNoticeType"><option value="info">일반</option><option value="warning">경고</option><option value="success">성공</option><option value="error">오류</option></select>
    </div>
    <div class="field"><label>활성화</label>
      <select id="editNoticeActive"><option value="1">활성</option><option value="0">비활성</option></select>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('noticeModal')">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveNotice()">저장</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
let currentSection='overview';
let statsData=null;
let charts={};

function esc(s){return CP.escHtml(s);}
function setErr(msg){document.getElementById('mainContent').innerHTML=`<div style="color:var(--error);padding:20px 0;font-size:.9rem">⚠️ ${esc(msg||'데이터를 불러오지 못했습니다.')}</div>`;}
function closeModal(id){document.getElementById(id).classList.remove('open')}

async function init(){
  const user=await CP.requireAdmin();
  if(!user)return;
  document.getElementById('adminAv').textContent=user.name[0].toUpperCase();
  document.getElementById('adminName').textContent=user.name;
  showSection('overview');
}

function showSection(sec){
  currentSection=sec;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+sec);
  if(nav)nav.classList.add('active');
  document.getElementById('lastRefresh').textContent='업데이트: '+new Date().toLocaleTimeString('ko-KR');

  const titles={overview:'개요',traffic:'트래픽',users:'사용자 관리',sites:'사이트 관리',notices:'공지 관리',revenue:'매출 관리',settings:'시스템 설정'};
  document.getElementById('pageTitle').textContent=titles[sec]||sec;

  const fn={overview:loadOverview,traffic:loadTraffic,users:loadUsers,sites:loadAdminSites,notices:loadNotices,revenue:loadRevenue,settings:loadSettings};
  if(fn[sec]) fn[sec]();
}

function refreshCurrent(){showSection(currentSection);}

/* ── OVERVIEW ── */
async function loadOverview(){
  const d=await CP.adminStats();
  if(!d.ok){document.getElementById('mainContent').innerHTML='<div style="color:var(--error)">데이터 로딩 실패</div>';return}
  statsData=d;

  document.getElementById('mainContent').innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon" style="background:rgba(249,115,22,.1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="7" r="4" stroke="#f97316" stroke-width="1.5"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/><path d="M16 3.13a4 4 0 0 1 0 7.75M21 21v-2a4 4 0 0 0-3-3.87" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="stat-val">${d.users.toLocaleString()}</div><div class="stat-lbl">전체 사용자</div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(99,102,241,.1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="14" rx="2" stroke="#6366f1" stroke-width="1.5"/><path d="M8 21h8M12 17v4" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="stat-val">${d.sites.toLocaleString()}</div><div class="stat-lbl">전체 사이트 <span style="font-size:.8rem;color:var(--success)">${d.activeSites} 활성</span></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(34,197,94,.1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><line x1="12" y1="1" x2="12" y2="23" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="stat-val">₩${(d.revenueMonth/10000).toFixed(1)}만</div><div class="stat-lbl">이번달 매출</div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(236,72,153,.1)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="#ec4899" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="stat-val">${d.sitesToday}</div><div class="stat-lbl">오늘 신규 사이트</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:22px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center">
        <div style="font-family:var(--font-head);font-size:1.2rem;font-weight:700">${d.sitesToday}</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:2px">오늘</div>
      </div>

async function saveSettings(){
  const settings={
    plan_starter_price:    document.getElementById('cfgStarterPrice').value,
    plan_pro_price:        document.getElementById('cfgProPrice').value,
    plan_enterprise_price: document.getElementById('cfgEntPrice').value,
    plan_starter_sites:    document.getElementById('cfgStarterSites').value,
    plan_pro_sites:        document.getElementById('cfgProSites').value,
    toss_client_key:       document.getElementById('cfgTossClient').value,
    toss_secret_key:       document.getElementById('cfgTossSecret').value,
    instawp_api_key:       document.getElementById('cfgInstawpKey').value,
  };
  // 빈 값은 저장 안 함
  Object.keys(settings).forEach(k=>{ if(!settings[k]) delete settings[k]; });
  const r=await CP.adminSaveSettings(settings);
  if(r.ok) showToast('설정 저장 완료','success');
  else showToast(r.error||'저장 실패','error');
}

/* Pagination helper */
function renderPager(page,pages,pageVar,loadFn){
  if(!pages||pages<=1) return '';
  let btns='';
  for(let i=1;i<=pages;i++) btns+=`<button class="page-btn${i===page?' active':''}" onclick="${pageVar}=${i};${loadFn}()">${i}</button>`;
  return `<div class="pager">${btns}</div>`;
}

/* Section card style for settings */
document.head.insertAdjacentHTML('beforeend',`<style>.section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:14px}.section-title{font-family:var(--font-head);font-size:.95rem;font-weight:700;margin-bottom:16px}</style>`);

init();
</script>
