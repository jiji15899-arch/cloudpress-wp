name = "cloudpress-puppet"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Browser Rendering API 바인딩
[browser]
binding = "MYBROWSER"

[vars]
WORKER_SECRET = "cp_puppet_secret_v1_CHANGE_ME"

# 배포: wrangler deploy (puppeteer-worker/ 디렉토리에서)
# 주의: Cloudflare Workers Browser Rendering은 유료 플랜 필요
