<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>새 사이트 추가 — CloudPress</title>
  <link rel="stylesheet" href="/dashboard.css"/>
  <style>
    .wizard-container { max-width: 800px; margin: 0 auto; padding-top: 40px; }
    .step-content { display: none; }
    .step-content.active { display: block; }
    .plan-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
    .plan-card { border: 2px solid var(--border); border-radius: 12px; padding: 24px; cursor: pointer; transition: all .2s; }
    .plan-card:hover { border-color: var(--accent); }
    .plan-card.selected { border-color: var(--accent); background: rgba(44, 51, 216, 0.05); }
    .payment-options { display: flex; gap: 12px; margin-top: 16px; }
    .pay-btn { flex:1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; text-align: center; font-size: 0.9rem; font-weight: 600; }
    .pay-btn.selected { border-color: var(--accent); background: rgba(44, 51, 216, 0.05); color: var(--accent); }
    .review-box { background: var(--surface2); border-radius: 10px; padding: 20px; margin-top: 20px; }
    .promo-wrap { display: flex; gap: 8px; margin-top: 12px; }
    .promo-wrap input { flex:1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; }
  </style>
</head>
<body>
<div class="app-wrap">
  <main class="main" style="margin-left:0">
    <div class="wizard-container">
      <div class="step-bar">
        <div class="step active" id="s1"><div class="step-circle">1</div><div class="step-label">플랜 선택</div></div>
        <div class="step-line"></div>
        <div class="step" id="s2"><div class="step-circle">2</div><div class="step-label">사이트 설정</div></div>
        <div class="step-line"></div>
        <div class="step" id="s3"><div class="step-circle">3</div><div class="step-label">검토 및 생성</div></div>
      </div>

      <!-- Step 1: Plan Selection -->
      <div class="step-content active" id="step1">
        <h2 class="provision-title">서버 플랜을 선택하세요</h2>
        <div class="plan-selector">
          <div class="plan-card selected" onclick="selectPlan('starter', 9900)">
            <h3>Starter</h3><p>₩9,900/mo</p>
          </div>
          <div class="plan-card" onclick="selectPlan('pro', 29900)">
            <h3>Pro</h3><p>₩29,900/mo</p>
          </div>
          <div class="plan-card" onclick="selectPlan('business', 99000)">
            <h3>Business</h3><p>₩99,000/mo</p>
          </div>
        </div>
        <div style="margin-top:24px">
          <label class="cw-input-label">결제 수단 선택</label>
          <div class="payment-options">
            <div class="pay-btn selected" id="pay-card" onclick="selectPayment('card')">신용카드</div>
            <div class="pay-btn" id="pay-vbank" onclick="selectPayment('vbank')">가상계좌</div>
            <div class="pay-btn" id="pay-toss" onclick="selectPayment('toss')">토스페이</div>
          </div>
        </div>
        <div style="margin-top:32px; text-align:right">
          <button class="btn btn-primary" onclick="goStep(2)">다음 단계로</button>
        </div>
      </div>

      <!-- Step 2: Site Config -->
      <div class="step-content" id="step2">
        <h2 class="provision-title">사이트 정보를 입력하세요</h2>
        <div class="card" style="margin-top:24px">
          <div class="field">
            <label>애플리케이션 이름</label>
            <input type="text" id="siteName" placeholder="My Awesome Blog"/>
          </div>
          <div class="field">
            <label>데이터 센터 위치</label>
            <select id="dataCenter">
              <option value="icn">Seoul (ICN)</option>
              <option value="nrt">Tokyo (NRT)</option>
            </select>
          </div>
        </div>
        <div style="margin-top:32px; display:flex; justify-content:space-between">
          <button class="btn btn-ghost" onclick="goStep(1)">이전</button>
          <button class="btn btn-primary" onclick="goStep(3)">검토하기</button>
        </div>
      </div>

      <!-- Step 3: Review -->
      <div class="step-content" id="step3">
        <h2 class="provision-title">설정 내용을 확인하세요</h2>
        <div class="review-box">
          <div class="info-row"><span class="label">선택한 플랜</span><span class="value" id="rPlan">Starter</span></div>
          <div class="info-row"><span class="label">사이트 이름</span><span class="value" id="rName">-</span></div>
          <div class="info-row"><span class="label">위치</span><span class="value" id="rLoc">Seoul</span></div>
          <div class="info-row"><span class="label">월 결제 금액</span><span class="value" id="rPrice">₩9,900</span></div>
          <div class="info-row"><span class="label">결제 수단</span><span class="value" id="rPayment">신용카드</span></div>
        </div>
        <div class="promo-wrap">
          <input type="text" id="promoCode" placeholder="할인 코드 입력"/>
          <button class="btn btn-ghost btn-sm" onclick="applyPromo()">적용</button>
        </div>
        <p style="margin-top:20px; font-size:.85rem; color:var(--muted)">'서버 생성' 클릭 시 즉시 프로비저닝이 시작됩니다.</p>
        <div style="margin-top:32px; display:flex; justify-content:space-between">
          <button class="btn btn-ghost" onclick="goStep(2)">이전</button>
          <button class="btn btn-primary" id="btnCreate" onclick="createSite()">서버 생성 시작</button>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="app.js"></script>
<script>
  let config = { plan: 'starter', price: 9900, name: '', loc: 'Seoul', payment_method: 'card', promo_code: '' };

  function selectPlan(p, price) {
    config.plan = p; config.price = price;
    document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
  }

  function selectPayment(m) {
    config.payment_method = m;
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('pay-' + m).classList.add('selected');
  }

  function applyPromo() {
    config.promo_code = document.getElementById('promoCode').value.trim();
    alert('할인 코드가 적용되었습니다: ' + config.promo_code);
  }

  function goStep(n) {
    if (n === 3) {
      config.name = document.getElementById('siteName').value;
      if (!config.name) return alert('이름을 입력해주세요.');
      document.getElementById('rPlan').textContent = config.plan.toUpperCase();
      document.getElementById('rName').textContent = config.name;
      document.getElementById('rPrice').textContent = `₩${config.price.toLocaleString()}`;
      document.getElementById('rPayment').textContent = config.payment_method === 'card' ? '신용카드' : (config.payment_method === 'vbank' ? '가상계좌' : '토스페이');
    }
    document.querySelectorAll('.step-content, .step').forEach(el => el.classList.remove('active', 'done'));
    document.getElementById('step' + n).classList.add('active');
    for(let i=1; i<=n; i++) {
      document.getElementById('s' + i).classList.add(i < n ? 'done' : 'active');
    }
  }

  async function createSite() {
    const btn = document.getElementById('btnCreate');
    btn.disabled = true; btn.textContent = '프로비저닝 중...';
    
    // 1단계: 사이트 레코드 생성
    const res = await CP.createSite({ 
      name: config.name, 
      plan: config.plan,
      payment_method: config.payment_method,
      promo_code: config.promo_code
    });

    if (res.ok) {
      // 2단계: 실제 Cloudflare 프로비저닝 시작 (백그라운드 실행)
      CP.startProvision(res.siteId).catch(e => console.error('Provision start failed:', e));
      
      showToast('사이트 구축이 시작되었습니다!', 'success');
      // 대시보드로 이동하면 dashboard.html의 폴링 로직이 상태를 추적함
      location.href = '/dashboard.html?new=true';
    } else {
      alert('생성 실패: ' + res.error);
      btn.disabled = false; btn.textContent = '서버 생성 시작';
    }
  }
</script>
</body>
</html>
