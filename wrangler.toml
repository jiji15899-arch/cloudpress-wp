name = "cloudpress-wp"
compatibility_date = "2025-01-01"
pages_build_output_dir = "."

# D1 데이터베이스 (사용자/사이트 관리)
[[d1_databases]]
binding = "DB"
database_name = "cloudpress-db"
database_id = "c7dea0ce-2e22-439f-9a1c-38ed24cbfc40"

# KV 네임스페이스 (세션)
[[kv_namespaces]]
binding = "SESSIONS"
id = "9cb18ceb35d24067a124b6c05e29915f"

[vars]
# 사이트 도메인
SITE_DOMAIN = "cloud-press.co.kr"
ADMIN_EMAIL = "choichoi3227@gmail.com"
ADMIN_PASSWORD = "Swsh120327!"  # 필수: 배포 전 반드시 변경하세요 (Cloudflare Dashboard > Pages > 환경변수에서 설정 권장)

# Puppeteer Worker URL (호스팅 자동화)
PUPPETEER_WORKER_URL = "https://cloudpress-puppet.workers.dev"
PUPPETEER_WORKER_SECRET = "Swsh120327!"

# Cloudflare CDN 자동 연동 (선택사항 - 사용자 도메인에 CDN 연동 시)
CF_API_TOKEN = ""
CF_ACCOUNT_ID = ""

# 결제 (Toss Payments)
TOSS_CLIENT_KEY = ""
TOSS_SECRET_KEY = ""

# 암호화 솔트
ENCRYPTION_KEY = "cloudpress_enc_salt_change_me_v3"
