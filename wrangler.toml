# CloudPress v12.5 — wrangler.toml (fixed)
# Pages Functions + 단일 Worker 배포 설정
#
# 수정:
#   - pages_build_output_dir 제거 (Cloudflare Pages 직접 배포 시 불필요, 오히려 라우팅 오작동 원인)
#   - CF_ACCOUNT_ID / CF_API_TOKEN은 wrangler secret put으로 설정 (빈값으로 두지 말 것)

name = "cloudpress-wp"
compatibility_date = "2024-09-23"

# ── 메인 D1 Database (사용자/사이트 메타 저장) ──
[[d1_databases]]
binding       = "DB"
database_name = "cloudpress-db"
database_id   = "02d86436-b49f-4efa-a93b-baa90f3ee095"  # wrangler d1 create cloudpress-db

# ── KV: 세션 ──
[[kv_namespaces]]
binding = "SESSIONS"
id      = "9cb18ceb35d24067a124b6c05e29915f"  # wrangler kv namespace create SESSIONS

# ── KV: 도메인→사이트 매핑 캐시 (전역) ──
[[kv_namespaces]]
binding = "CACHE"
id      = "e1acf814c1244a59bbc24865723e479d"  # wrangler kv namespace create CACHE

# ── 환경 변수 ──
# 민감한 값은 반드시 wrangler secret put 으로 설정
[vars]
# WP origin 프록시 타겟 (origin에 부하 없이 Worker만 프록시)
WP_ORIGIN_URL    = "https://admin-1775040937976.webcustom-hosting.com/"   # wrangler secret put WP_ORIGIN_URL
WP_ORIGIN_SECRET = "Swsh120327!"   # wrangler secret put WP_ORIGIN_SECRET

# Cloudflare 계정 정보 (사이트 전용 D1/KV REST API 접근용)
# Worker에서 사이트별 KV 페이지 캐시 읽기/쓰기에 사용
CF_ACCOUNT_ID = ""      # wrangler secret put CF_ACCOUNT_ID
CF_API_TOKEN  = ""      # wrangler secret put CF_API_TOKEN
                        # 필요 권한: D1 Read, KV Read/Write

# ── 개발 환경 ──
[dev]
port = 8788
local_protocol = "http"
