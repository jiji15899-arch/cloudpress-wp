# CloudPress v11.0 — wrangler.toml
# Pages Functions + 단일 Worker 배포 설정

name = "cloudpress-wp"
compatibility_date = "2024-09-23"

# ── Pages Functions 빌드 설정 ──
pages_build_output_dir = "."

# ── D1 Database ──
[[d1_databases]]
binding  = "DB"
database_name = "cloudpress-db"
database_id   = ""   # wrangler d1 create cloudpress-db 실행 후 채우기

# ── KV Namespace ──
# 용도: 도메인→사이트 매핑 캐시 + 페이지 캐시 + 세션
[[kv_namespaces]]
binding   = "SESSIONS"
id        = ""   # wrangler kv namespace create SESSIONS 실행 후 채우기

[[kv_namespaces]]
binding   = "CACHE"
id        = ""   # wrangler kv namespace create CACHE 실행 후 채우기

# ── 환경 변수 (민감한 값은 wrangler secret put으로 설정) ──
[vars]
# Worker가 읽는 WP origin URL (wrangler secret put WP_ORIGIN_URL 으로 설정 권장)
WP_ORIGIN_URL    = ""   # 예: https://origin.cloudpress.site
WP_ORIGIN_SECRET = ""   # mu-plugin 공유 시크릿 (wrangler secret put WP_ORIGIN_SECRET)

# ── 배포된 단일 Worker 설정 (worker.js) ──
# worker.js는 별도 wrangler.worker.toml로 배포
# Pages Functions와 별개로 Workers에 배포됨

# ── 개발 환경 ──
[dev]
port = 8788
local_protocol = "http"
