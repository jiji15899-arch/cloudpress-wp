name = "cloudpress-wp"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# D1 데이터베이스 (사용자/사이트 관리)
[[d1_databases]]
binding = "DB"
database_name = "cloudpress-db"
database_id = "YOUR_D1_DATABASE_ID"

# KV 네임스페이스 (세션)
[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_KV_NAMESPACE_ID"

[vars]
# 사이트 도메인
SITE_DOMAIN = "cloud-press.co.kr"
ADMIN_EMAIL = "admin@example.com"

# Puppeteer Worker URL (호스팅 자동화)
PUPPETEER_WORKER_URL = "https://cloudpress-puppet.workers.dev"
PUPPETEER_WORKER_SECRET = "cp_puppet_secret_v1_CHANGE_ME"

# Cloudflare CDN 자동 연동 (선택사항 - 사용자 도메인에 CDN 연동 시)
CF_API_TOKEN = ""
CF_ACCOUNT_ID = ""

# 결제 (Toss Payments)
TOSS_CLIENT_KEY = ""
TOSS_SECRET_KEY = ""

# 암호화 솔트
ENCRYPTION_KEY = "cloudpress_enc_salt_change_me_v3"
