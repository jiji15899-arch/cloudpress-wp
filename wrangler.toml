# CloudPress v18.0 — wrangler.toml
# Pages Functions + 단일 Worker 배포 설정
#
# [v18.0 수정 사항]
# - compatibility_date 업데이트 (2024-09-23 → 2025-01-01)
# - nodejs_compat 제거 (Error 1101 원인 중 하나)
# - CF_ACCOUNT_ID / CF_API_TOKEN은 wrangler secret put으로 설정

name = "cloudpress-wp"
compatibility_date = "2025-01-01"

# nodejs_compat 제거 — 있으면 삭제
# compatibility_flags = ["nodejs_compat"]  ← 삭제

# ── 메인 D1 Database ──
[[d1_databases]]
binding       = "DB"
database_name = "cloudpress-db"
database_id   = "02d86436-b49f-4efa-a93b-baa90f3ee095"

# ── KV: 세션 ──
[[kv_namespaces]]
binding = "SESSIONS"
id      = "7486ca3c985b41ee8e2d24589ab2be6d"

# ── KV: 도메인→사이트 매핑 캐시 ──
[[kv_namespaces]]
binding = "CACHE"
id      = "e1acf814c1244a59bbc24865723e479d"

# ── 환경 변수 ──
[vars]
WP_ORIGIN_URL    = "https://cloud-press-host-sub.x10.mx/"
WP_ORIGIN_SECRET = "Swsh120327!"
CF_ACCOUNT_ID    = ""
CF_API_TOKEN     = ""

# ── Limits ──
[limits]
cpu_ms = 30000

# ── 개발 환경 ──
[dev]
port = 8788
local_protocol = "http"
