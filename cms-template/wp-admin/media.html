<div id="wpcontent"><div class="wrap">
  <h1>미디어 라이브러리</h1>
  <div class="upload-area" id="uploadArea">
    <input type="file" multiple accept="image/*,video/*,audio/*,.pdf,.zip" onchange="handleFiles(this.files)">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" style="opacity:.3;margin:0 auto 12px;display:block"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="17 8 12 3 7 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="3" x2="12" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <div style="font-size:.9rem;font-weight:600;margin-bottom:4px">파일을 드래그하거나 클릭하여 업로드</div>
    <div style="font-size:.78rem;color:var(--muted)">이미지, 동영상, 오디오, PDF 등 지원</div>
  </div>
  <div id="uploadMsg" style="display:none;margin-bottom:12px;padding:10px 14px;border-radius:3px;font-size:.84rem"></div>
  <div class="media-grid" id="mediaGrid"><div style="color:var(--muted);font-size:.88rem;padding:20px 0">미디어 라이브러리가 비어 있습니다.</div></div>
</div></div>
<script src="/wp-admin/media.js"></script><script src="/wp-admin/admin.js"></script>
