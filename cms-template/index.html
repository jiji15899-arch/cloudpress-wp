<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title id="pageTitle">CloudPress CMS</title>
<meta name="description" content="" id="metaDesc">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="siteHeader"></div>

<main class="site-main">
  <section class="posts-area" id="postsArea">
    <!-- 스켈레톤 로딩 -->
    <div class="post-card skeleton-card">
      <div class="skeleton sk-title"></div>
      <div class="skeleton sk-meta"></div>
      <div class="skeleton sk-text"></div>
      <div class="skeleton sk-text"></div>
      <div class="skeleton sk-text"></div>
    </div>
    <div class="post-card skeleton-card">
      <div class="skeleton sk-title"></div>
      <div class="skeleton sk-meta"></div>
      <div class="skeleton sk-text"></div>
      <div class="skeleton sk-text"></div>
    </div>
  </section>

  <aside class="sidebar">
    <div class="widget">
      <h3 class="widget-title">카테고리</h3>
      <ul id="sidebarCategories"><li style="color:#9ca3af">로딩 중...</li></ul>
    </div>
    <div class="widget">
      <h3 class="widget-title">최근 글</h3>
      <ul id="recentPosts"><li style="color:#9ca3af">로딩 중...</li></ul>
    </div>
  </aside>
</main>

<div id="siteFooter"></div>

<script src="/main.js"></script>
</body>
</html>
