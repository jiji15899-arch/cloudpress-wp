<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>로그인 — CloudPress CMS</title>
<link rel="stylesheet" href="/wp-login/login.css">
</head>
<body>
<div>
  <div class="login-logo">
    <svg width="64" height="64" viewBox="0 0 28 28" fill="none">
      <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="#2271b1" stroke-width="1.5"/>
      <path d="M14 8L20 11V17L14 20L8 17V11L14 8Z" fill="#2271b1" opacity=".4"/>
      <circle cx="14" cy="14" r="2.5" fill="#2271b1"/>
    </svg>
    <h1 id="siteTitle">내 사이트</h1>
  </div>

  <div id="loginform">
    <div class="form-group">
      <label for="user_login">사용자명 또는 이메일</label>
      <input type="text" id="user_login" name="log" autocomplete="username" autofocus/>
    </div>
    <div class="form-group">
      <label for="user_pass">비밀번호</label>
      <div class="pw-group">
        <input type="password" id="user_pass" name="pwd" autocomplete="current-password"/>
        <button type="button" class="pw-toggle" onclick="togglePw()" title="비밀번호 보기/숨기기">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
      </div>
    </div>
    <label class="remember">
      <input type="checkbox" id="rememberme" checked/>
      로그인 유지
    </label>
    <button class="wp-submit" onclick="doLogin()" id="submitBtn">로그인</button>
    <div id="loginErr"></div>
    <div id="loginOk"></div>
  </div>

  <div class="login-links"><a href="/">← 사이트로 돌아가기</a></div>
</div>
<script src="/wp-login/login.js"></script>
</body>
</html>
