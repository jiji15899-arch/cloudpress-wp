<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>사이트 상세 — CloudPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
  <style>
    .info-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
    .info-title{font-family:var(--font-head);font-weight:700;font-size:.95rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .info-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
    .info-row:last-child{border:none}
    .info-label{font-size:.8rem;color:var(--muted);width:140px;flex-shrink:0}
    .info-val{flex:1;font-size:.88rem;font-weight:600;word-break:break-all}
    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700}
    .status-active{background:rgba(34,197,94,.1);color:#16a34a}
    .status-pending,.status-provisioning,.status-installing_wp{background:rgba(249,115,22,.1);color:var(--accent)}
    .status-failed{background:rgba(239,68,68,.1);color:var(--error)}
    .status-suspended{background:rgba(245,158,11,.1);color:var(--warning)}
    .wp-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .suspended-banner{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:16px;margin-bottom:20px}
    .pw-field{display:flex;align-items:center;gap:8px}
    .pw-field input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.85rem;font-weight:600;color:var(--text)}
  </style>
</head>
<body>
<div class="app-wrap">
  <aside class="sidebar" id="sidebar">
    <a href="/dashboard.html" class="sb-logo">
      <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M14 8L20 11V17L14 20L8 17V11L14 8Z" fill="currentColor" opacity=".5"/>
        <circle cx="14" cy="14" r="2.2" fill="currentColor"/>
      </svg>CloudPress
    </a>
    <nav class="sb-nav">
      <div class="sb-section">
        <a href="/dashboard.html" class="sb-link">대시보드</a>
        <a href="/create.html" class="sb-link">사이트 추가</a>
      </div>
      <div class="sb-section">
        <button class="sb-link danger" onclick="CP.logout()">로그아웃</button>
      </div>
    </nav>
  </aside>
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="sidebar-toggle" onclick="openSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <span class="topbar-title" id="pageTitle">사이트 상세</span>
      </div>
      <a href="/dashboard.html" class="btn btn-ghost btn-sm">← 대시보드</a>
    </div>

    <div class="content" id="content">
      <div style="text-align:center;padding:60px;color:var(--muted)">
        <div style="display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite"></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
  </main>
</div>

<script src="app.js"></script>
<script>
const PROVIDER_NAMES = {
  infinityfree: 'InfinityFree', byethost: 'ByetHost', hyperphp: 'HyperPHP',
  freehosting: 'FreeHosting', profreehost: 'ProFreeHost', aeonfree: 'AeonFree',
};

const STATUS_LABELS = {
  pending: '대기 중', provisioning: '호스팅 생성 중', installing_wp: 'WordPress 설치 중',
  active: '활성', failed: '실패', deleted: '삭제됨',
};

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

async function loadSite() {
  const params = new URLSearchParams(location.search);
  const siteId = params.get('id');
  if (!siteId) { document.getElementById('content').innerHTML = '<p style="color:var(--error);text-align:center;padding:40px">사이트 ID가 없습니다.</p>'; return; }

  const token = CP.getToken();
  const res = await fetch('/api/sites/' + siteId, { headers: { 'Authorization': 'Bearer ' + token } });
  const data = await res.json();
  if (!data.ok) { document.getElementById('content').innerHTML = `<p style="color:var(--error);text-align:center;padding:40px">${data.error || '사이트를 불러올 수 없습니다.'}</p>`; return; }

  const site = data.site;
  document.getElementById('pageTitle').textContent = site.name || '사이트 상세';
  document.title = site.name + ' — CloudPress';

  const statusLabel = STATUS_LABELS[site.status] || site.status;
  const statusCls = site.suspended ? 'status-suspended' : `status-${site.status}`;
  const isActive = site.status === 'active' && !site.suspended;

  const suspendedHtml = site.suspended ? `
    <div class="suspended-banner">
      <div style="font-weight:700;color:var(--warning);margin-bottom:6px">⚠️ 이 사이트는 일시 정지 상태입니다</div>
      <div style="font-size:.85rem;color:var(--muted)">${esc(site.suspension_reason || '호스팅 제한')}</div>
      <div style="margin-top:10px;font-size:.82rem">
        플랜 업그레이드 또는 <a href="/contact.html" style="color:var(--accent)">고객센터 문의</a>를 통해 해결할 수 있습니다.
      </div>
    </div>` : '';

  document.getElementById('content').innerHTML = `
    ${suspendedHtml}

    <div class="info-card">
      <div class="info-title">
        🌐 WordPress 사이트 정보
        <span class="status-badge ${statusCls}">${site.suspended ? '일시 정지' : statusLabel}</span>
      </div>

      ${isActive ? `
      <div class="wp-actions">
        <a href="${esc(site.wp_url)}" target="_blank" class="btn btn-ghost">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" stroke="currentColor" stroke-width="1.5"/><polyline points="15 3 21 3 21 9" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="14" x2="21" y2="3" stroke="currentColor" stroke-width="1.5"/></svg>
          사이트 방문
        </a>
        <a href="${esc(site.wp_admin_url || site.wp_url + '/wp-admin/')}" target="_blank" class="btn btn-primary">
          ⚙️ WordPress 관리자
        </a>
      </div>` : ''}

      <div class="info-row"><div class="info-label">사이트 이름</div><div class="info-val">${esc(site.name)}</div></div>
      <div class="info-row"><div class="info-label">사이트 URL</div><div class="info-val"><a href="${esc(site.wp_url || '')}" target="_blank" style="color:var(--accent)">${esc(site.wp_url || '생성 중...')}</a></div></div>
      <div class="info-row"><div class="info-label">관리자 URL</div><div class="info-val"><a href="${esc(site.wp_admin_url || '')}" target="_blank" style="color:var(--accent)">${esc(site.wp_admin_url || '생성 중...')}</a></div></div>
      <div class="info-row"><div class="info-label">호스팅 업체</div><div class="info-val">${PROVIDER_NAMES[site.hosting_provider] || site.hosting_provider || '—'}</div></div>
      <div class="info-row"><div class="info-label">WordPress 버전</div><div class="info-val">${esc(site.wp_version || '—')}</div></div>
      <div class="info-row"><div class="info-label">SSL 인증서</div><div class="info-val">${site.ssl_active ? '✅ 활성화됨' : '⏳ 준비 중'}</div></div>
      <div class="info-row"><div class="info-label">Cloudflare CDN</div><div class="info-val">${site.cloudflare_zone_id ? '✅ 연결됨' : '—'}</div></div>
      <div class="info-row"><div class="info-label">Breeze 캐시</div><div class="info-val">${site.breeze_installed ? '✅ 설치됨' : '—'}</div></div>
      <div class="info-row"><div class="info-label">생성일</div><div class="info-val">${new Date(site.created_at).toLocaleString('ko-KR')}</div></div>
    </div>

    <div class="info-card">
      <div class="info-title">🔐 WordPress 로그인 정보</div>
      <div class="info-row"><div class="info-label">관리자 아이디</div><div class="info-val">${esc(site.wp_username || '—')}</div></div>
      <div class="info-row">
        <div class="info-label">관리자 비밀번호</div>
        <div class="info-val">
          <div class="pw-field">
            <input type="password" value="${esc(site.wp_password || '')}" readonly id="wpPw"/>
            <button onclick="togglePw()" class="btn btn-ghost btn-sm">보기</button>
            <button onclick="navigator.clipboard.writeText(document.getElementById('wpPw').value)" class="btn btn-ghost btn-sm">복사</button>
          </div>
        </div>
      </div>
      <div style="background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.15);border-radius:8px;padding:12px;font-size:.8rem;color:var(--muted);margin-top:12px">
        ⚠️ 위 비밀번호를 안전한 곳에 반드시 보관하세요.
      </div>
    </div>

    <div class="info-card">
      <div class="info-title" style="color:var(--error)">⚠️ 위험 구역</div>
      <p style="font-size:.84rem;color:var(--muted);margin-bottom:14px">이 사이트를 삭제하면 모든 데이터가 제거되며 되돌릴 수 없습니다.</p>
      <button class="btn btn-ghost" style="color:var(--error);border-color:rgba(239,68,68,.3)" onclick="deleteSite('${site.id}','${esc(site.name)}')">이 사이트 삭제</button>
    </div>
  `;
}

function togglePw() {
  const inp = document.getElementById('wpPw');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function deleteSite(id, name) {
  if (!confirm(`"${name}" 사이트를 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  const token = CP.getToken();
  const res = await fetch('/api/sites/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token },
  });
  const data = await res.json();
  if (data.ok) location.href = '/dashboard.html';
  else alert('삭제 실패: ' + (data.error || ''));
}

(async () => {
  const u = await CP.requireAuth();
  if (!u) return;
  await loadSite();
})();
</script>
</body>
</html>
