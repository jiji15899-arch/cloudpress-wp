<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>사이트 상세 — CloudPress</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Cloudways 현대적 디자인 스타일 */
    .info-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:28px;margin-bottom:24px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03)}
    .info-title{font-family:var(--font-head);font-weight:700;font-size:1.1rem;margin-bottom:24px;display:flex;align-items:center;gap:12px;color:var(--t1)}
    .info-row{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border2)}
    .info-row:last-child{border:none}
    .info-label{font-size:.88rem;color:var(--t2);width:220px;flex-shrink:0;font-weight:500}
    .info-val{flex:1;font-size:.9rem;font-weight:600;color:var(--t1);word-break:break-all}
    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700}
    .status-active{background:rgba(34,197,94,.1);color:#16a34a}
    .status-pending,.status-provisioning,.status-installing_wp{background:rgba(249,115,22,.1);color:var(--accent)}
    .status-failed{background:rgba(239,68,68,.1);color:var(--error)}
    .status-suspended{background:rgba(245,158,11,.1);color:var(--warning)}
    .wp-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .suspended-banner{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:16px;margin-bottom:20px}
    .domain-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .domain-item:last-child{border:none}
    .domain-name{flex:1;font-size:.9rem;font-weight:600;word-break:break-all}
    .domain-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:.72rem;font-weight:700;white-space:nowrap}
    .tag-primary{background:rgba(34,197,94,.1);color:#16a34a}
    .tag-sub{background:rgba(99,102,241,.1);color:#4f46e5}
    .tag-pending{background:rgba(249,115,22,.1);color:var(--accent)}
    .tag-active{background:rgba(34,197,94,.1);color:#16a34a}
    .tag-failed{background:rgba(239,68,68,.1);color:var(--error)}
    .domain-actions{display:flex;gap:6px}
    .ns-box{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:16px;margin-top:8px;margin-bottom:4px}
    .ns-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
    .ns-row:last-child{border:none}
    .ns-label{font-size:.75rem;color:var(--muted);width:60px;flex-shrink:0}
    .ns-val{flex:1;font-family:monospace;font-size:.85rem;font-weight:600;word-break:break-all}
    .copy-btn{padding:3px 8px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-size:.72rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .copy-btn:hover{border-color:var(--accent);color:var(--accent)}
    .add-domain-form{margin-top:16px;display:flex;gap:8px}
    .add-domain-form input{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.88rem;outline:none}
    .add-domain-form input:focus{border-color:var(--accent)}
    .domain-verify-result{padding:10px 14px;border-radius:8px;font-size:.83rem;margin-top:10px}
    .verify-ok{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);color:#15803d}
    .verify-fail{background:rgba(249,115,22,.07);border:1px solid rgba(249,115,22,.2);color:var(--accent)}
    .spec-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.74rem;font-weight:700;margin:2px}
    .spec-pill.edge{background:rgba(139,92,246,.1);color:#7c3aed}
    .spec-pill.tz{background:rgba(16,185,129,.1);color:#059669}
    .spec-pill.cms{background:rgba(59,130,246,.1);color:#2563eb}
    .spec-pill.d1{background:rgba(245,158,11,.1);color:#d97706}
    .purge-btn{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);color:#4f46e5;border-radius:8px;padding:8px 16px;font-size:.85rem;font-weight:700;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
    .purge-btn:hover{background:rgba(99,102,241,.18)}
    .purge-btn:disabled{opacity:.5;cursor:not-allowed}

    /* Tabs UI */
    .tabs-nav{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;padding-bottom:1px}
    .tab-btn{padding:12px 20px;border:none;background:none;font-size:.9rem;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
    .tab-btn:hover{color:var(--accent);background:var(--surf2)}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
    .tab-pane{display:none}
    .tab-pane.active{display:block}
    
    /* Cloudways Modal Style */
    .cw-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}
    .cw-modal.open{display:flex}
    .cw-modal-content{background:var(--surface);width:100%;max-width:450px;border-radius:12px;padding:32px;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
    .cw-modal-title{font-size:1.2rem;font-weight:700;margin-bottom:12px;color:var(--t1)}
    .cw-modal-desc{font-size:.85rem;color:var(--t2);margin-bottom:24px;line-height:1.6}
    .cw-input-label{display:block;font-size:.8rem;font-weight:600;margin-bottom:8px;color:var(--t1)}
    .cw-input{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;margin-bottom:20px}
    .cw-modal-actions{display:flex;justify-content:flex-end;gap:12px}

    /* Monitoring Style */
    .chart-container{position:relative;height:320px;width:100%;margin-top:20px;background:var(--bg2);padding:15px;border-radius:10px}
    .metric-summary{display:flex;gap:24px;margin-bottom:20px}
    .metric-box{flex:1;background:var(--surface);padding:16px;border-radius:8px;border:1px solid var(--border)}

    /* Action Grid */
    .action-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:16px}
    .action-item{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:12px}
    .action-header{display:flex;justify-content:space-between;align-items:center}
    .action-name{font-weight:700;font-size:.9rem}
    .action-desc{font-size:.8rem;color:var(--t2);line-height:1.4}
    
    @media (max-width:600px){
      .info-label{width:100px;font-size:.75rem}
      .info-val{font-size:.82rem}
      .wp-actions{gap:6px}
      .wp-actions .btn,.wp-actions .purge-btn{font-size:.8rem;padding:8px 12px}
      .domain-item{flex-wrap:wrap;gap:8px}
      .domain-actions{width:100%;justify-content:flex-end}
      .add-domain-form{flex-direction:column}
      .info-card{padding:16px}
    }
    @media (max-width:400px){
      .info-row{flex-direction:column;gap:4px}
      .info-label{width:100%;padding-bottom:2px}
    }
  </style>
</head>

<script src="app.js"></script>
<script>
const STATUS_LABELS = {
  pending:'대기 중',provisioning:'호스팅 생성 중',installing_wp:'WordPress 설치 중',
  active:'활성',failed:'실패',deleted:'삭제됨',
};
let currentSite=null, currentDomains=[];
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
let resourceChart = null;

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn, .tab-pane').forEach(el => el.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

/* 실시간 로그 스트리밍 기능 */
let logSocket = null;
let reconnectAttempts = 0;
let reconnectTimeout = null;

async function startLogStreaming() {
  const consoleEl = document.getElementById('logConsole');
  if (!consoleEl) return;
  
  if (reconnectTimeout) clearTimeout(reconnectTimeout);

  const res = await CP.initLogTail(currentSite.id);
  if (!res.ok) {
    consoleEl.innerHTML += `<div class="log-entry error">로그 세션 연결 실패: ${res.error}</div>`;
    // API 실패 시에도 백오프 재시도
    retryConnection();
    return;
  }

  logSocket = new WebSocket(res.url, ['cloudflare-worker-tail']);
  logSocket.onopen = () => {
    reconnectAttempts = 0; // 연결 성공 시 시도 횟수 초기화
    consoleEl.innerHTML += `<div class="log-entry info">WebSocket 연결 성공. 실시간 스트리밍 중...</div>`;
  };
  logSocket.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      const entry = document.createElement('div');
      entry.className = `log-entry ${data.level === 'error' ? 'error' : 'info'}`;
      const time = new Date(data.timestamp).toLocaleTimeString();
      const msg = data.logs?.map(l => l.message).join(' ') || `${data.event?.request?.method || 'GET'} ${data.event?.request?.url || ''}`;
      entry.innerHTML = `<span class="log-time">${time}</span> ${esc(msg)}`;
      consoleEl.appendChild(entry);
      if (consoleEl.childNodes.length > 100) consoleEl.removeChild(consoleEl.firstChild);
      consoleEl.scrollTop = consoleEl.scrollHeight;
    } catch(e) {}
  };
  logSocket.onclose = (e) => {
    consoleEl.innerHTML += `<div class="log-entry">연결이 종료되었습니다. 재연결을 시도합니다...</div>`;
    retryConnection();
  };
  logSocket.onerror = () => {
    logSocket.close();
  };
}

function retryConnection() {
  const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000); // 최대 30초 백오프
  reconnectAttempts++;
  reconnectTimeout = setTimeout(startLogStreaming, delay);
}

function stopLogStreaming() {
  if (reconnectTimeout) clearTimeout(reconnectTimeout);
  if (logSocket) logSocket.close();
}

function initResourceChart() {
  const ctx = document.getElementById('resourceChart').getContext('2d');
  resourceChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'CPU 실행 시간 (ms)',
        borderColor: '#2c33d8',
        backgroundColor: 'rgba(44, 51, 216, 0.1)',
        data: [],
        fill: true,
        tension: 0.4
      }, {
        label: '요청 수 (Requests)',
        borderColor: '#fb923c',
        backgroundColor: 'rgba(251, 146, 60, 0.1)',
        data: [],
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom' } }
    }
  });
  updateChartData();
  setInterval(updateChartData, 60000); // 1분마다 갱신
}

async function updateChartData() {
  const res = await CP.getMetrics(currentSite.id);
  if (res.ok) {
    resourceChart.data.labels = res.labels;
    resourceChart.data.datasets[0].data = res.cpu;
    resourceChart.data.datasets[1].data = res.requests;
    resourceChart.update();
    document.getElementById('avgCpu').textContent = res.cpu.length ? (res.cpu.reduce((a,b)=>parseFloat(a)+parseFloat(b),0)/res.cpu.length).toFixed(2) + ' ms' : '0 ms';
    document.getElementById('totalReq').textContent = res.requests.reduce((a,b)=>a+b,0) + ' req';
  }
}

async function loadSite(){
  const params=new URLSearchParams(location.search);
  const siteId=params.get('id');
  if(!siteId){document.getElementById('content').innerHTML='<p style="color:var(--error);text-align:center;padding:40px">사이트 ID가 없습니다.</p>';return;}
  let data;
  try{
    const token=CP.getToken();
    const res=await fetch('/api/sites/'+siteId,{headers:{'Authorization':'Bearer '+token}});
    const ct=res.headers.get('content-type')||'';
    if(!ct.includes('application/json')){document.getElementById('content').innerHTML=`<p style="color:var(--error);text-align:center;padding:40px">서버 응답 오류 (${res.status}).</p>`;return;}
    data=await res.json();
  }catch(e){document.getElementById('content').innerHTML=`<p style="color:var(--error);text-align:center;padding:40px">네트워크 오류: ${e.message}</p>`;return;}
  if(!data.ok){document.getElementById('content').innerHTML=`<p style="color:var(--error);text-align:center;padding:40px">${data.error||'사이트를 불러올 수 없습니다.'}</p>`;return;}

  currentSite=data.site;
  const site=currentSite;
  document.getElementById('pageTitle').textContent=site.name||'사이트 상세';
  document.title=site.name+' — CloudPress';

  const statusLabel=STATUS_LABELS[site.status]||site.status;
  const statusCls=site.suspended?'status-suspended':`status-${site.status}`;
  const isActive=site.status==='active'&&!site.suspended;

  const specPills=isActive?`
    <div style="margin-bottom:12px">
      <span class="spec-pill edge">⚡ Edge Runtime</span>
      <span class="spec-pill cms">📦 WordPress</span>
      <span class="spec-pill tz">🕐 KST (Asia/Seoul)</span>
      <span class="spec-pill d1">🗄️ D1 Database</span>
    </div>`:'';

  const suspendedHtml=site.suspended?`
    <div class="suspended-banner">
      <div style="font-weight:700;color:var(--warning);margin-bottom:6px">⚠️ 이 사이트는 일시 정지 상태입니다</div>
      <div style="font-size:.85rem;color:var(--muted)">${esc(site.suspension_reason||'호스팅 제한')}</div>
      <div style="margin-top:10px;font-size:.82rem">
        플랜 업그레이드 또는 <a href="/chat.html" style="color:var(--accent)">고객센터 문의</a>를 통해 해결할 수 있습니다.
      </div>
    </div>`:'';

  const workerDevUrl=site.worker_name?`https://${site.worker_name}.workers.dev`:'';
  const siteUrl=site.primary_domain?`https://${site.primary_domain}`:workerDevUrl;

  document.getElementById('content').innerHTML=`
    ${suspendedHtml}
    <div class="info-card">
      <div class="info-title">
        🌐 WordPress 사이트 정보
        <span class="status-badge ${statusCls}">${site.suspended?'일시 정지':statusLabel}</span>
      </div>
      ${specPills}
      ${isActive?`
      <div class="wp-actions">
        <a href="${esc(siteUrl||'#')}" target="_blank" class="btn btn-ghost">

        <a href="${esc(site.wp_admin_url||(siteUrl?siteUrl+'/wp-admin/':'#'))}" target="_blank" class="btn btn-primary">

      <div class="info-row"><div class="info-label">사이트 이름</div><div class="info-val">${esc(site.name)}</div></div>

      <div class="info-row"><div class="info-label">데이터베이스</div><div class="info-val">Cloudflare D1 (SQLite) ✅</div></div>

      <div class="info-row"><div class="info-label">Cron Job</div><div class="info-val">${site.cron_enabled?'✅ 활성화됨':'—'}</div></div>
      <div class="info-row"><div class="info-label">속도 최적화</div><div class="info-val">${site.speed_optimized?'✅ 최적화됨':'—'}</div></div>
      <div class="info-row"><div class="info-label">생성일</div><div class="info-val">${site.created_at?new Date(isNaN(site.created_at)?site.created_at:site.created_at*1000).toLocaleString('ko-KR'):'—'}</div></div>
    </div>

    <div class="info-card">
      <div class="info-title">🔐 WordPress 로그인 정보</div>
      ${(site.wp_admin_url||siteUrl)?`
      <div class="info-row">
        <div class="info-label">아이디 (Username)</div>
        <div class="info-val">
          <code style="background:rgba(34,113,177,.08);padding:2px 8px;border-radius:4px;font-size:.9rem;user-select:all">${esc(site.wp_admin_username||'admin')}</code>

      </div>

        <div class="info-label">비밀번호 (Password)</div>

        🔑 위 아이디/비밀번호로 <a href="${esc(site.wp_admin_url||siteUrl+'/wp-admin/')}" target="_blank" style="color:var(--accent)">WordPress 관리자</a>에 로그인하세요.<br>
        보안을 위해 로그인 후 <strong>비밀번호를 즉시 변경</strong>하시길 강력히 권장합니다.
      </div>`:`
      <div style="color:var(--muted);font-size:.85rem;padding:12px 0">
        ⏳ 프로비저닝 완료 후 로그인 정보가 표시됩니다.

    </div>

    ${isActive?`

        <div class="add-domain-form">
          <input type="text" id="newDomainInput" placeholder="예: example.com 또는 www.example.com" autocomplete="off"/>
          <button class="btn btn-primary btn-sm" onclick="addDomain('${site.id}')">추가</button>

      <div class="info-title" style="color:var(--error)">⚠️ 위험 구역</div>
      <p style="font-size:.84rem;color:var(--muted);margin-bottom:14px">이 사이트를 삭제하면 모든 데이터가 제거되며 되돌릴 수 없습니다.</p>
      <button class="btn btn-ghost" style="color:var(--error);border-color:rgba(239,68,68,.3)" onclick="deleteSite('${site.id}','${esc(site.name)}')">이 사이트 삭제</button>
    </div>

  if(isActive) await loadDomains(site.id);

/* 캐시 제거 */
async function purgeCache(siteId){
  const btn=document.getElementById('purgeBtn');
  if(!btn)return;
  btn.disabled=true;
  btn.textContent='⏳ 제거 중...';
  try{
    const token=CP.getToken();
    const res=await fetch(`/api/sites/${siteId}/purge-cache`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}});
    const data=await res.json();
    if(data.ok){showToast('✅ 캐시가 성공적으로 제거되었습니다.','success');}
    else{showToast('캐시 제거 실패: '+(data.error||'알 수 없는 오류'),'error');}
  }catch(e){showToast('오류: '+e.message,'error');}
  finally{btn.disabled=false;btn.textContent='🗑️ 캐시 제거';}
}

/* 도메인 관리 */
async function loadDomains(siteId){
  try{
    const token=CP.getToken();
    const res=await fetch(`/api/sites/${siteId}/domains`,{headers:{'Authorization':'Bearer '+token}});
    const data=await res.json();
    if(!data.ok){document.getElementById('domainList').innerHTML='<p style="color:var(--muted);font-size:.84rem">도메인 목록을 불러올 수 없습니다.</p>';return;}
    currentDomains=data.domains||[];
    renderDomainList(siteId,currentDomains,data.subdomain,data.primaryDomain);
  }catch(e){
    document.getElementById('domainList').innerHTML=`<p style="color:var(--muted);font-size:.84rem">오류: ${e.message}</p>`;
  }
}

function renderDomainList(siteId,domains,subdomain,primaryDomain){
  const listEl=document.getElementById('domainList');
  if(!listEl)return;
  let html='';
  const subUrl=subdomain||'';
  const isSubPrimary=!primaryDomain||primaryDomain===subUrl.replace(/^https?:\/\//,'');
  html+=`
    <div class="domain-item">
      <div style="flex:1">
        <div class="domain-name">${esc(subUrl)}</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:2px">호스팅사 제공 서브도메인 (기본)</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="domain-tag tag-sub">서브도메인</span>
        ${isSubPrimary?'<span class="domain-tag tag-primary">주도메인</span>':''}
      </div>
    </div>`;
  if(!domains.length){
    html+=`<div style="padding:16px 0;font-size:.83rem;color:var(--muted);text-align:center;border-top:1px solid var(--border)">추가된 도메인이 없습니다.</div>`;
  }else{
    for(const d of domains){
      const stMap={pending:'<span class="domain-tag tag-pending">⏳ NS 전환 대기</span>',active:'<span class="domain-tag tag-active">✅ 활성화됨</span>',failed:'<span class="domain-tag tag-failed">❌ 실패</span>'};
      html+=`
        <div class="domain-item" id="dom-${esc(d.id)}">
          <div style="flex:1">
            <div class="domain-name">${esc(d.domain)}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
              ${stMap[d.status]||''}
              ${d.is_primary?'<span class="domain-tag tag-primary">주도메인</span>':''}
              ${d.verified_at?`<span style="font-size:.72rem;color:var(--muted)">연결: ${new Date(d.verified_at).toLocaleDateString('ko-KR')}</span>`:''}
            </div>
          </div>
          <div class="domain-actions">
            ${d.status==='pending'?`
              <button class="btn btn-ghost btn-sm" onclick="showNsGuide('${esc(d.id)}')">NS 설정 안내</button>
              <button class="btn btn-ghost btn-sm" onclick="verifyDomain('${siteId}','${esc(d.id)}')">연결 확인</button>`:''}
            ${d.status==='active'&&!d.is_primary?`<button class="btn btn-primary btn-sm" onclick="setPrimaryDomain('${siteId}','${esc(d.id)}','${esc(d.domain)}')">주도메인 설정</button>`:''}
            ${!d.is_primary?`<button class="btn btn-ghost btn-sm" style="color:var(--error)" onclick="removeDomain('${siteId}','${esc(d.id)}','${esc(d.domain)}')">삭제</button>`:''}
          </div>
        </div>
        <div class="ns-box" id="ns-guide-${esc(d.id)}" style="display:none">
          <div style="font-size:.82rem;font-weight:700;margin-bottom:10px;color:var(--accent)">📋 Cloudflare 네임서버 설정 안내</div>
          <div style="font-size:.8rem;color:var(--muted);margin-bottom:12px">
            도메인 등록 업체의 <strong>네임서버(NS)</strong>를 아래 Cloudflare 네임서버로 변경해주세요.<br>
            이미 Cloudflare에 등록된 도메인이라면 자동 연결됩니다.
          </div>
          <div class="ns-row">
            <div class="ns-label">NS 1</div>
            <div class="ns-val" id="ns1-${esc(d.id)}">불러오는 중...</div>
            <button class="copy-btn" onclick="copyNsVal('${esc(d.id)}',1)">복사</button>
          </div>
          <div class="ns-row">
            <div class="ns-label">NS 2</div>
            <div class="ns-val" id="ns2-${esc(d.id)}">불러오는 중...</div>
            <button class="copy-btn" onclick="copyNsVal('${esc(d.id)}',2)">복사</button>
          </div>
          <div style="margin-top:10px;padding:8px 10px;background:rgba(99,102,241,.05);border-radius:6px;font-size:.77rem;color:var(--muted)">
            ⏱ 네임서버 변경은 최대 48시간 소요됩니다. 보통 1~2시간 내 적용.<br>
            변경 후 "연결 확인" 버튼을 눌러주세요.
          </div>
        </div>`;
    }
  }
  listEl.innerHTML=html;
  // NS 정보 비동기 로드
  for(const d of domains){
    if(d.status==='pending') loadNsInfo(d.id,d.domain);
  }
}

const _nsCache={};
async function loadNsInfo(domId,domain){
  try{
    const token=CP.getToken();
    const rootDomain=domain.split('.').slice(-2).join('.');
    const res=await fetch(`/api/dns/zones?domain=${encodeURIComponent(rootDomain)}`,{headers:{'Authorization':'Bearer '+token}});
    const data=await res.json();
    const ns1El=document.getElementById(`ns1-${domId}`);
    const ns2El=document.getElementById(`ns2-${domId}`);
    if(data.ok&&data.nameservers&&ns1El&&ns2El){
      ns1El.textContent=data.nameservers[0]||'ns1.cloudflare.com';
      ns2El.textContent=data.nameservers[1]||'ns2.cloudflare.com';
      _nsCache[domId]=[data.nameservers[0],data.nameservers[1]];
    }else{
      if(ns1El)ns1El.textContent='ns1.cloudflare.com';
      if(ns2El)ns2El.textContent='ns2.cloudflare.com';
    }
  }catch{
    const ns1El=document.getElementById(`ns1-${domId}`);
    const ns2El=document.getElementById(`ns2-${domId}`);
    if(ns1El)ns1El.textContent='ns1.cloudflare.com';
    if(ns2El)ns2El.textContent='ns2.cloudflare.com';
  }
}

function copyNsVal(domId,num){
  const el=document.getElementById(`ns${num}-${domId}`);
  if(el){navigator.clipboard.writeText(el.textContent).catch(()=>{});showToast('복사되었습니다.','success');}
}

function showNsGuide(domId){
  const el=document.getElementById(`ns-guide-${domId}`);
  if(el){el.style.display=el.style.display==='none'?'':'none';}
}

async function addDomain(siteId){
  const input=document.getElementById('newDomainInput');
  const domain=input.value.trim();
  if(!domain){showDomainResult('도메인을 입력해주세요.',false);return;}
  document.getElementById('addDomainResult').style.display='none';
  try{
    const token=CP.getToken();
    const res=await fetch(`/api/sites/${siteId}/domains`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({domain})});
    const data=await res.json();
    if(!data.ok){showDomainResult(data.error||'도메인 추가 실패',false);return;}
    if(data.auto_connected){
      showDomainResult(`✅ "${data.domain}" 도메인이 Cloudflare에서 자동으로 연결되었습니다!`,true);
    }else{
      showDomainResult(`✅ "${data.domain}" 도메인이 추가되었습니다. "NS 설정 안내"를 확인 후 "연결 확인"을 눌러주세요.`,true);
    }
    input.value='';
    await loadDomains(siteId);
    if(data.domainId&&!data.auto_connected){
      setTimeout(()=>showNsGuide(data.domainId),400);
    }
  }catch(e){showDomainResult('오류: '+e.message,false);}
}

async function verifyDomain(siteId,domainId){
  const btn=document.querySelector(`#dom-${domainId} .btn[onclick*="verifyDomain"]`);
  if(btn){btn.disabled=true;btn.textContent='확인 중...';}
  try{
    const token=CP.getToken();
    const res=await fetch(`/api/sites/${siteId}/domains?action=verify`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({domainId})});
    const data=await res.json();
    if(data.verified){showDomainResult(`✅ "${data.domain}" 도메인이 성공적으로 연결되었습니다!`,true);}
    else{showDomainResult('⏳ 아직 네임서버가 전파되지 않았습니다. 잠시 후 다시 시도해주세요.',false);}
    await loadDomains(siteId);
  }catch(e){
    showDomainResult('확인 오류: '+e.message,false);
    if(btn){btn.disabled=false;btn.textContent='연결 확인';}
  }
}

async function setPrimaryDomain(siteId,domainId,domain){
  if(!confirm(`"${domain}"을(를) 주도메인으로 설정하시겠습니까?\n사이트 접속 주소가 변경됩니다.`))return;
  try{
    const token=CP.getToken();
    const res=await fetch(`/api/sites/${siteId}/domains?action=set-primary`,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({domainId})});
    const data=await res.json();
    if(data.ok){showDomainResult(`✅ "${domain}"이(가) 주도메인으로 설정되었습니다! 페이지를 새로고침합니다...`,true);setTimeout(()=>location.reload(),1500);}
    else{showDomainResult(data.error||'주도메인 설정 실패',false);}
  }catch(e){showDomainResult('오류: '+e.message,false);}
}

async function removeDomain(siteId,domainId,domain){
  if(!confirm(`"${domain}" 도메인을 삭제하시겠습니까?`))return;
  try{
    const token=CP.getToken();
    const res=await fetch(`/api/sites/${siteId}/domains`,{method:'DELETE',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({domainId})});
    const data=await res.json();
    if(data.ok){showDomainResult(`"${domain}" 도메인이 삭제되었습니다.`,true);await loadDomains(siteId);}
    else{showDomainResult(data.error||'삭제 실패',false);}
  }catch(e){showDomainResult('오류: '+e.message,false);}
}

function showDomainResult(msg,success){
  const el=document.getElementById('addDomainResult');
  if(!el)return;
  el.className='domain-verify-result '+(success?'verify-ok':'verify-fail');
  el.textContent=msg;
  el.style.display='';
  setTimeout(()=>{el.style.display='none';},8000);
}

async function deleteSite(id,name){
  if(!confirm(`"${name}" 사이트를 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`))return;
  const token=CP.getToken();
  let delData;
  try{
    const res=await fetch('/api/sites/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}});
    delData=await res.json();
  }catch(e){alert('삭제 중 오류: '+e.message);return;}
  if(delData.ok)location.href='/dashboard.html';
  else alert('삭제 실패: '+(delData.error||''));
}

(async()=>{
  const u=await CP.requireAuth();
  if(!u)return;
  if(CP.isAdminOrMgr(u)){
    const am=document.getElementById('adminMenu');
    if(am)am.style.display='';
  }
  await loadSite();
})();
</script>
